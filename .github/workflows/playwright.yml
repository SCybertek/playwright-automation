name: Playwright Tests
on:
  push: #autotriggers on push to main or master branch
    branches: [main, master]
  pull_request:
    branches: [main, master]
  scheduele:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows manual trigger of the workflow from GitHub Actions tab
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest # VM image to run the tests, linux is recommended for better performance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days:
            30
            # configures the environment variables for the tests
      - name: configure environment variables
        run: |
          echo "PRACTICE_USERNAME=${{ secrets.PRACTICE_USERNAME}}" >> $GITHUB_ENV
          echo "PRACTICE_PASSWORD=${{ secrets.PRACTICE_PASSWORD}}" >> $GITHUB_ENV

      # runs the tests in headless mode
      - name: Run all tests
        run: npm run tests:headless

      # upload test results and reports
      - name: upload playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
